# GitHub Pages — deploys docs on every release tag.
name: Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docs site
        run: |
          mkdir -p _site
          # Copy root docs
          cp README.md _site/index.md
          cp CHANGELOG.md _site/changelog.md
          cp AGENTS.md _site/agents.md
          test -f LICENSE && cp LICENSE _site/LICENSE || true
          test -f llms.txt && cp llms.txt _site/llms.txt || true
          # Copy organized docs
          cp -r docs/ _site/docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
