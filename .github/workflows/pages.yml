# GitHub Pages — deploys docs on every release tag.
# Only copies static markdown files. No untrusted input used.
name: Pages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build docs site
        run: |
          mkdir -p _site
          cp README.md _site/index.md
          cp CONTRIBUTING.md _site/contributing.md
          cp AGENTS.md _site/agents.md
          cp llms.txt _site/llms.txt
          cp LICENSE _site/LICENSE

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
