name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1
        with:
          shared-key: release-ubuntu-latest
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Install pinned developer tools
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-llvm-cov,cargo-audit,cargo-deny,cargo-dist,gitleaks,trivy
      - name: Validate release tag
        shell: bash
        run: ./scripts/release-check.sh
      - name: Run release contract
        shell: bash
        run: ./scripts/validate.sh --mode release
      - name: Build release artifacts
        shell: bash
        run: cargo dist build --tag ${{ github.ref_name }}
