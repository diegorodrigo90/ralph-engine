# Release pipeline — triggered by version tags.
# Builds cross-platform binaries via GoReleaser, publishes to:
#   1. GitHub Releases (binaries + checksums)
#   2. Homebrew tap (via GoReleaser brews section)
#   3. npm registry (wrapper package that downloads binary)
# No untrusted user input is used in run commands.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests before release
        run: go test ./... -count=1 -race

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release
    # Only run if NPM_TOKEN is configured — skip silently in forks.
    if: ${{ vars.NPM_PUBLISH_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Set npm package version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          cd npm
          node -e "
            const v = process.env.TAG_NAME.replace(/^v/, '');
            const pkg = require('./package.json');
            pkg.version = v;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Publishing ralph-engine@${VERSION} to npm"

      - name: Publish to npm
        run: |
          cd npm
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
