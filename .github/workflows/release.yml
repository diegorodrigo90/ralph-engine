name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: SemVer tag to publish, for example v0.2.0-alpha.1
        required: true
        type: string
      publish_github_release:
        description: Create or update the GitHub Release and upload assets
        required: true
        default: true
        type: boolean
      publish_npm:
        description: Publish the npm channels (`ralph-engine` and `create-ralph-engine-plugin`)
        required: true
        default: false
        type: boolean
      publish_homebrew:
        description: Update the Homebrew tap with the rendered formula
        required: true
        default: false
        type: boolean
      homebrew_tap_repository:
        description: Optional owner/repo override for the Homebrew tap
        required: false
        default: ""
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release-tag:
    name: Validate release tag input
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate SemVer release tag input
        shell: bash
        run: ./scripts/release-check.sh "${{ inputs.tag }}"

  verify-release-target:
    name: Verify current main SHA and green CI run
    needs: validate-release-tag
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      ci_run_id: ${{ steps.release_readiness.outputs.ci_run_id }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify current main SHA and green CI run
        id: release_readiness
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: ./scripts/verify-release-readiness.sh

  verify-release-helpers:
    name: Validate release helper scripts
    needs: validate-release-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
      - name: Check release helper scripts syntax
        shell: bash
        run: |
          node --check ./scripts/prepare-npm-release.mjs
          node --check ./scripts/verify-npm-release.mjs
          node --check ./scripts/verify-npm-install.mjs
          node --check ./scripts/render-homebrew-formula.mjs
          bash -n ./scripts/verify-release-channel-contract.sh
          bash -n ./scripts/verify-dist-workspace.sh
          bash -n ./scripts/verify-release-assets.sh
          bash -n ./scripts/verify-homebrew-formula.sh
      - name: Verify cargo-dist workspace contract
        shell: bash
        run: ./scripts/verify-dist-workspace.sh

  verify-release-channel-contract:
    name: Verify release channel contract
    needs: validate-release-tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify release channel contract
        shell: bash
        run: |
          ./scripts/verify-release-channel-contract.sh \
            "${{ inputs.publish_github_release }}" \
            "${{ inputs.publish_npm }}" \
            "${{ inputs.publish_homebrew }}"

  fetch-release-artifacts:
    name: Download reusable release artifacts from CI
    needs:
      - validate-release-tag
      - verify-release-target
      - verify-release-helpers
      - verify-release-channel-contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - name: Download reusable Linux release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: gh run download "${{ needs.verify-release-target.outputs.ci_run_id }}" --repo "${{ github.repository }}" --name release-dist-ubuntu --dir .release/dist/ubuntu
      - name: Download reusable macOS release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: gh run download "${{ needs.verify-release-target.outputs.ci_run_id }}" --repo "${{ github.repository }}" --name release-dist-macos --dir .release/dist/macos
      - name: Download reusable Windows release artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: gh run download "${{ needs.verify-release-target.outputs.ci_run_id }}" --repo "${{ github.repository }}" --name release-dist-windows --dir .release/dist/windows
      - name: Assemble publishable release asset set
        shell: bash
        run: |
          mkdir -p .release/assets
          find .release/dist -type f -print0 | while IFS= read -r -d '' file; do
            cp -n "$file" .release/assets/
          done
          ls -1 .release/assets
      - name: Verify assembled release assets
        shell: bash
        run: ./scripts/verify-release-assets.sh .release/assets --require-all-targets
      - name: Upload staged release assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: approved-release-assets
          path: .release/assets/*
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish release channels
    needs: fetch-release-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
      - name: Download staged approved release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: approved-release-assets
          path: .release/assets
      - name: Re-verify current main SHA and green CI run before publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: ./scripts/verify-release-readiness.sh
      - name: Create Git tag when it does not exist yet
        shell: bash
        run: |
          git fetch --tags origin
          if ! git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ inputs.tag }}" "${GITHUB_SHA}"
            git push origin "${{ inputs.tag }}"
          fi
      - name: Publish GitHub Release
        if: inputs.publish_github_release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ inputs.tag }}" .release/assets/* --clobber
          else
            gh release create "${{ inputs.tag }}" .release/assets/* --title "${{ inputs.tag }}" --generate-notes
          fi
      - name: Verify published GitHub Release exists for downstream channels
        if: inputs.publish_npm || inputs.publish_homebrew
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" >/dev/null
      - name: Attest published release assets
        if: inputs.publish_github_release
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: .release/assets/*
      - name: Prepare npm package payloads
        if: inputs.publish_npm
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          node ./scripts/prepare-npm-release.mjs --version "$VERSION" --out-dir .release/npm
      - name: Verify staged npm package payloads
        if: inputs.publish_npm
        shell: bash
        run: |
          node ./scripts/verify-npm-release.mjs \
            --package-dir .release/npm/ralph-engine \
            --package-dir .release/npm/create-ralph-engine-plugin
      - name: Smoke-test staged npm package install flows
        if: inputs.publish_npm
        shell: bash
        run: |
          node ./scripts/verify-npm-install.mjs \
            --package-dir .release/npm/ralph-engine \
            --package-dir .release/npm/create-ralph-engine-plugin
      - name: Publish npm packages
        if: inputs.publish_npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "NPM_TOKEN is required when publish_npm=true" >&2
            exit 1
          fi
          (
            cd .release/npm/ralph-engine
            npm publish --provenance --access public
          )
          (
            cd .release/npm/create-ralph-engine-plugin
            npm publish --provenance --access public
          )
      - name: Render Homebrew formula from release assets
        if: inputs.publish_homebrew
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          node ./scripts/render-homebrew-formula.mjs --version "$VERSION" --dist-dir .release/assets --output .release/homebrew/ralph-engine.rb
      - name: Upload staged Homebrew formula
        if: inputs.publish_homebrew
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: staged-homebrew-formula
          path: .release/homebrew/ralph-engine.rb
          if-no-files-found: error
          retention-days: 3

  validate-homebrew-formula:
    name: Validate Homebrew formula on macOS
    if: inputs.publish_homebrew
    needs: publish
    runs-on: macos-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download staged Homebrew formula
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: staged-homebrew-formula
          path: .release/homebrew
      - name: Validate Homebrew formula and install flow
        shell: bash
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          bash ./scripts/verify-homebrew-formula.sh .release/homebrew/ralph-engine.rb "$VERSION"

  publish-homebrew:
    name: Publish Homebrew tap update
    if: inputs.publish_homebrew
    needs: validate-homebrew-formula
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download staged Homebrew formula
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: staged-homebrew-formula
          path: .release/homebrew
      - name: Publish Homebrew tap update
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: bash ./scripts/publish-homebrew-tap.sh "${{ inputs.tag }}" .release/homebrew/ralph-engine.rb "${{ inputs.homebrew_tap_repository }}"
