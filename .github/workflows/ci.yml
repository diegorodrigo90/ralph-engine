name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
      - name: Install commitlint dependencies
        run: npm ci
      - name: Lint commit messages against Conventional Commits
        run: npx commitlint --from origin/main --to HEAD --verbose

  quality:
    name: Validate code quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            checks: fmt,clippy,test,rustdoc,public
          - os: macos-latest
            checks: fmt,clippy,test,rustdoc,public
          - os: windows-latest
            checks: fmt,clippy,test,rustdoc,public
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: quality-${{ matrix.os }}
      - name: Install repository Node dependencies
        run: npm ci
      - name: Install docs Node dependencies
        run: npm --prefix docs ci
      - name: Install pinned coverage tooling
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-llvm-cov
      - name: Run quality validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks "${{ matrix.checks }}"
      - name: Generate Rust coverage report
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage/lcov.info
      - name: Upload Rust coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: rust-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 3

  security:
    name: Run security scanners (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Security scanners here are platform-independent for this repository shape.
    # Running them once on the canonical Linux runner keeps the gate strict while
    # avoiding duplicated installs and duplicate findings across the OS matrix.
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: security-ubuntu-latest
      - name: Install repository Node dependencies
        run: npm ci
      - name: Install docs Node dependencies
        run: npm --prefix docs ci
      - name: Install pinned security tooling
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-audit,cargo-deny,gitleaks,trivy
      - name: Run security validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks deny,audit,gitleaks,trivy

  sonar:
    name: Analyze code in SonarCloud
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 20
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Verify SonarCloud token and project access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: ./scripts/verify-sonarcloud-access.sh
      - name: Resolve SonarCloud project metadata
        shell: bash
        run: ./scripts/export-sonarcloud-metadata.sh
      - name: Download Rust coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: rust-coverage-lcov
          path: coverage
      - name: Run SonarCloud analysis and quality gate
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build-release-artifacts:
    name: Build reusable release artifacts (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    needs: [quality]
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-dist-ubuntu
          - os: macos-latest
            artifact_name: release-dist-macos
          - os: windows-latest
            artifact_name: release-dist-windows
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-artifacts-${{ matrix.os }}
      - name: Install pinned cargo-dist
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-dist
      - name: Resolve workspace release version
        id: release_version
        shell: bash
        run: |
          VERSION="$(./scripts/export-release-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"
      - name: Build cargo-dist artifacts for reusable release
        shell: bash
        run: dist build --tag "v${{ steps.release_version.outputs.version }}"
      - name: Upload reusable release artifacts
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          name: ${{ matrix.artifact_name }}
          path: target/distrib/*
          if-no-files-found: error
          retention-days: 14
