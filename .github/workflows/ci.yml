name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.19.0'
      - run: npm ci
      - run: npx commitlint --from origin/main --to HEAD --verbose

  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            checks: fmt,clippy,test,coverage,rustdoc,deny,audit,gitleaks,trivy,public
            install_dev_tools: true
          - os: macos-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
          - os: windows-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.19.0'
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Install repository Node tools
        run: npm ci
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Install pinned developer tools (Unix)
        if: matrix.install_dev_tools && runner.os != 'Windows'
        shell: bash
        run: ./scripts/install-dev-tools.sh
      - name: Install pinned developer tools (Windows)
        if: matrix.install_dev_tools && runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/install-dev-tools.ps1
      - name: Run validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks "${{ matrix.checks }}"

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20.19.0'
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Install pinned developer tools
        shell: bash
        run: ./scripts/install-dev-tools.sh
      - name: Generate coverage
        shell: bash
        run: ./scripts/validate.sh --mode ci --checks coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
