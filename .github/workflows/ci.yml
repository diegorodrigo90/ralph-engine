name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
      - run: npm ci
      - run: npx commitlint --from origin/main --to HEAD --verbose

  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
          - os: macos-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
          - os: windows-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@bc2d2e71bd35c5549942babaa51a89c586b981d1
        with:
          shared-key: quality-${{ matrix.os }}
      - name: Install repository Node tools
        run: npm ci
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Run validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks "${{ matrix.checks }}"

  security:
    name: Security (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: security-ubuntu-latest
      - name: Install repository Node tools
        run: npm ci
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Install pinned security tools
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-audit,cargo-deny,gitleaks,trivy
      - name: Run security contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks deny,audit,gitleaks,trivy

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [quality, security]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          shared-key: sonar-ubuntu-latest
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Install pinned developer tools
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-llvm-cov
      - name: Generate coverage
        shell: bash
        run: ./scripts/validate.sh --mode ci --checks coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
