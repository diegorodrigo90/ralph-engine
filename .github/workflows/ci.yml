name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Validate commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install commitlint dependencies
        run: npm ci
      - name: Lint commit messages against Conventional Commits
        run: npx commitlint --from origin/main --to HEAD --verbose

  quality:
    name: Validate code quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            checks: fmt,clippy,test,rustdoc,public
          - os: macos-latest
            checks: fmt,clippy,test,rustdoc,public
          - os: windows-latest
            checks: fmt,clippy,test,rustdoc,public
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: quality-${{ matrix.os }}
      - name: Install repository Node dependencies
        shell: bash
        run: |
          corepack disable 2>/dev/null || true
          npm ci
      - name: Install site Node dependencies
        shell: bash
        working-directory: site
        run: npm ci
      - name: Restore pinned coverage tool cache
        if: matrix.os == 'ubuntu-latest'
        id: restore_coverage_tool_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: coverage-tools-${{ runner.os }}-${{ hashFiles('scripts/install-dev-tools.sh') }}
      - name: Install pinned coverage tooling
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-llvm-cov
      - name: Save pinned coverage tool cache
        if: matrix.os == 'ubuntu-latest' && steps.restore_coverage_tool_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: ${{ steps.restore_coverage_tool_cache.outputs.cache-primary-key }}
      - name: Run quality validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks "${{ matrix.checks }}"
      - name: Generate Rust coverage report
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p coverage
          cargo llvm-cov --workspace --all-features --lcov --output-path coverage/lcov.info
      - name: Upload Rust coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: rust-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 3

  security:
    name: Run security scanners (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Security scanners here are platform-independent for this repository shape.
    # Running them once on the canonical Linux runner keeps the gate strict while
    # avoiding duplicated installs and duplicate findings across the OS matrix.
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify cargo-dist workspace contract
        shell: bash
        run: ./scripts/verify-dist-workspace.sh
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: security-ubuntu-latest
      - name: Restore pinned security tool cache
        id: restore_security_tool_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: security-tools-${{ runner.os }}-${{ hashFiles('scripts/install-dev-tools.sh') }}
      - name: Install pinned security tooling
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-audit,cargo-deny,gitleaks,trivy
      - name: Save pinned security tool cache
        if: steps.restore_security_tool_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: ${{ steps.restore_security_tool_cache.outputs.cache-primary-key }}
      - name: Run security validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks deny,audit,gitleaks,trivy

  semver:
    name: Check semver compatibility
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: semver-ubuntu-latest
      - name: Install cargo-semver-checks
        shell: bash
        run: cargo install cargo-semver-checks --locked
      - name: Run semver compatibility check
        shell: bash
        run: cargo semver-checks check-release --workspace

  sonar:
    name: Analyze code in SonarCloud
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Verify SonarCloud token and project access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: ./scripts/verify-sonarcloud-access.sh
      - name: Resolve SonarCloud project metadata
        shell: bash
        run: ./scripts/export-sonarcloud-metadata.sh
      - name: Download Rust coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: rust-coverage-lcov
          path: coverage
      - name: Run SonarCloud analysis and quality gate
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build-release-candidates:
    name: Build release candidates (${{ matrix.os }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: release-candidate-dist-ubuntu
          - os: macos-latest
            artifact_name: release-candidate-dist-macos
          - os: windows-latest
            artifact_name: release-candidate-dist-windows
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: release-artifacts-${{ matrix.os }}
      - name: Restore pinned cargo-dist tool cache
        id: restore_release_tool_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: release-tools-${{ runner.os }}-${{ hashFiles('scripts/install-dev-tools.sh') }}
      - name: Install pinned cargo-dist
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-dist
      - name: Save pinned cargo-dist tool cache
        if: steps.restore_release_tool_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7
        with:
          path: ~/.cache/ralph-engine-tools
          key: ${{ steps.restore_release_tool_cache.outputs.cache-primary-key }}
      - name: Resolve workspace release version
        id: release_version
        shell: bash
        run: |
          VERSION="$(./scripts/export-release-version.sh)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"
      - name: Build cargo-dist artifacts for reusable release
        shell: bash
        run: dist build --tag "v${{ steps.release_version.outputs.version }}"
      - name: Upload release candidate artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.artifact_name }}
          path: target/distrib/*
          if-no-files-found: error
          retention-days: 14

  approve-release-artifacts:
    name: Approve reusable release artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [sonar, build-release-candidates]
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Download Linux release candidate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidate-dist-ubuntu
          path: .release/candidates/ubuntu
      - name: Download macOS release candidate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidate-dist-macos
          path: .release/candidates/macos
      - name: Download Windows release candidate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-candidate-dist-windows
          path: .release/candidates/windows
      - name: Verify cargo-dist workspace contract
        shell: bash
        run: ./scripts/verify-dist-workspace.sh
      - name: Verify Linux release candidate artifacts
        shell: bash
        run: ./scripts/verify-release-assets.sh .release/candidates/ubuntu
      - name: Verify macOS release candidate artifacts
        shell: bash
        run: ./scripts/verify-release-assets.sh .release/candidates/macos
      - name: Verify Windows release candidate artifacts
        shell: bash
        run: ./scripts/verify-release-assets.sh .release/candidates/windows
      - name: Publish approved Linux release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-dist-ubuntu
          path: .release/candidates/ubuntu/*
          if-no-files-found: error
          retention-days: 14
      - name: Publish approved macOS release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-dist-macos
          path: .release/candidates/macos/*
          if-no-files-found: error
          retention-days: 14
      - name: Publish approved Windows release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-dist-windows
          path: .release/candidates/windows/*
          if-no-files-found: error
          retention-days: 14
