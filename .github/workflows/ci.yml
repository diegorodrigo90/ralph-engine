name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
      - run: npm ci
      - run: npx commitlint --from origin/main --to HEAD --verbose

  quality:
    name: Quality (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
          - os: macos-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
          - os: windows-latest
            checks: fmt,clippy,test,rustdoc,public
            install_dev_tools: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: quality-${{ matrix.os }}
      - name: Install repository Node tools
        run: npm ci
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Run validation contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks "${{ matrix.checks }}"

  security:
    name: Security (ubuntu-latest)
    runs-on: ubuntu-latest
    # Security scanners here are platform-independent for this repository shape.
    # Running them once on the canonical Linux runner keeps the gate strict while
    # avoiding duplicated installs and duplicate findings across the OS matrix.
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: security-ubuntu-latest
      - name: Install repository Node tools
        run: npm ci
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Restore pinned tools cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ralph-engine-tools
          key: ${{ runner.os }}-pinned-tools-${{ hashFiles('scripts/install-dev-tools.sh') }}
      - name: Install pinned security tools
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-audit,cargo-deny,gitleaks,trivy
      - name: Run security contract
        shell: bash
        env:
          GIT_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GIT_HEAD_SHA: ${{ github.sha }}
        run: ./scripts/validate.sh --mode ci --checks deny,audit,gitleaks,trivy

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [quality, security]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: '20.19.0'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs/package-lock.json
      - name: Preflight SonarCloud access
        shell: bash
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        run: ./scripts/verify-sonarcloud-access.sh
      - name: Resolve SonarCloud metadata
        shell: bash
        run: ./scripts/export-sonarcloud-metadata.sh
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Restore Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          shared-key: sonar-ubuntu-latest
      - name: Install docs Node tools
        run: npm --prefix docs ci
      - name: Restore pinned tools cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ralph-engine-tools
          key: ${{ runner.os }}-pinned-tools-${{ hashFiles('scripts/install-dev-tools.sh') }}
      - name: Install pinned developer tools
        shell: bash
        run: ./scripts/install-dev-tools.sh --tools cargo-llvm-cov
      - name: Generate coverage
        shell: bash
        run: ./scripts/validate.sh --mode ci --checks coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        with:
          args: >-
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
