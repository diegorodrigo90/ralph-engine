name: Catalog Scan

on:
  schedule:
    # Daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

# Minimum permissions: read repo to scan, write to create branch + PR.
# GITHUB_TOKEN is scoped to this repo only and expires after the job.
permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Scan community plugins
        env:
          SCAN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: GITHUB_TOKEN="$SCAN_TOKEN" node scripts/scan-community-plugins.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet site/src/data/plugins.json site/public/plugins/index.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR with catalog update
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/catalog-update-$(date +%Y%m%d-%H%M)"
          DIFF_SUMMARY=$(git diff --stat site/src/data/plugins.json site/public/plugins/index.json | tail -1)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Close any existing catalog PRs (only one should be open at a time)
          gh pr list --label "" --search "chore(catalog)" --state open --json number --jq '.[].number' | \
            xargs -I{} gh pr close {} --delete-branch 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add site/src/data/plugins.json site/public/plugins/index.json
          git commit -m "chore(catalog): update community plugin index"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore(catalog): update community plugin index" \
            --body "Automated daily scan. Review community plugin changes before merging.

          Changes: ${DIFF_SUMMARY}

          **Security note:** All community data is sanitized (HTML stripped, IDs validated, fields whitelisted). Review the diff for unexpected entries." \
            --base main \
            --head "$BRANCH"
