name: Release Automation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-plz-pr:
    name: Release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.91.1 --profile minimal --component rustfmt --component clippy
          rustup default 1.91.1
      - name: Run release-plz release-pr
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11
        with:
          command: release-pr
          config: release-plz.toml
          version: "0.3.157"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
