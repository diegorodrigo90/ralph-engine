[licenses]
# All permissive licenses compatible with MIT.
# Each was verified before adding.
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "CC0-1.0",
  "Unicode-3.0",
  "CDLA-Permissive-2.0",  # webpki-root-certs (CA certificate data, Linux Foundation)
  "MPL-2.0",              # option-ext (via directories → dirs-sys), weak copyleft, compatible with MIT
  "Zlib",                 # foldhash (via ratatui), permissive, compatible with MIT
  "BSL-1.0",              # clipboard-win + error-code (via arboard), OSI approved, Boost license
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
# TODO: restore to "deny" after ratatui-themekit is published to crates.io
wildcards = "warn"

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/diegorodrigo90/ratatui-themekit"]
