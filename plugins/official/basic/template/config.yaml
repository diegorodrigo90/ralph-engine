# ralph-engine basic template
# Minimal workflow-oriented bootstrap. Customize freely.

agent:
  type: "claude"
  cooldown_seconds: 10
  max_work_items_per_session: 1

workflow:
  instructions: |
    Follow a minimal implementation loop.
    Read the work item, implement the change, run tests, and leave the tree reviewable.

execution:
  max_post_agent_retries: 0
  max_retry_output_chars: 800

tracker:
  type: "file"
  status_file: "sprint-status.yaml"

circuit_breaker:
  max_failures: 3
  cooldown_minutes: 5

research:
  enabled: false
  strategy: "always"
  tools: []
