id: official.github
kind: data_source
display_name: GitHub
display_name_locales:
  pt-br: GitHub
summary: GitHub data, context, forge, and MCP integration.
summary_locales:
  pt-br: Integração de dados, contexto, forge e MCP do GitHub.
description: >
  Comprehensive GitHub integration for Ralph Engine. Provides three typed
  providers: a data source for repository metadata (issues, PRs, branches),
  a context provider for CI status and workflow information, and a forge
  provider for automating GitHub operations (create PRs, manage releases).
  Also contributes an MCP server for direct GitHub API access from agent sessions.
description_locales:
  pt-br: >
    Integração completa do GitHub para o Ralph Engine. Fornece três provedores
    tipados: fonte de dados para metadados do repositório (issues, PRs, branches),
    provedor de contexto para status de CI e informações de workflow, e provedor
    forge para automatizar operações no GitHub (criar PRs, gerenciar releases).
    Também contribui um servidor MCP para acesso direto à API do GitHub a partir
    de sessões de agente.
publisher: official
trust_level: official
plugin_version: 0.2.0-alpha.1
plugin_api_version: 1.0.0
runtime: true
lifecycle:
  - discover
  - configure
  - load
runtime_hooks:
  - mcp_registration
  - data_source_registration
  - context_provider_registration
  - forge_provider_registration
engine_version: ">=0.2.0-alpha.1"
capabilities:
  - data_source
  - context_provider
  - forge_provider
  - mcp_contribution
providers:
  - id: official.github.data
    kind: data_source
    display_name: GitHub data source
    display_name_locales:
      pt-br: Fonte de dados GitHub
    summary: Exposes typed repository data to Ralph Engine workflows.
    summary_locales:
      pt-br: Expõe dados tipados de repositório para workflows Ralph Engine.
  - id: official.github.context
    kind: context_provider
    display_name: GitHub context provider
    display_name_locales:
      pt-br: Provedor de contexto GitHub
    summary: Exposes typed GitHub context for Ralph Engine workflows.
    summary_locales:
      pt-br: Expõe contexto tipado do GitHub para workflows Ralph Engine.
  - id: official.github.forge
    kind: forge_provider
    display_name: GitHub forge provider
    display_name_locales:
      pt-br: Provedor forge GitHub
    summary: Exposes typed forge automation for GitHub-backed workflows.
    summary_locales:
      pt-br: Expõe automação forge tipada para workflows baseados em GitHub.
