id: official.claude
kind: agent_runtime
display_name: Claude
display_name_locales:
  pt-br: Claude
summary: Claude agent runtime and MCP session integration.
summary_locales:
  pt-br: Integração do runtime de agente Claude com sessão MCP.
description: >
  Integrates Anthropic's Claude as an agent runtime for Ralph Engine workflows.
  Detects the Claude CLI binary on your PATH, validates readiness, and provides
  an MCP server contribution for session management. Use `ralph-engine agents launch
  official.claude.session` to bootstrap a Claude-powered coding session with your
  project's plugins, checks, and prompt fragments pre-loaded.
description_locales:
  pt-br: >
    Integra o Claude da Anthropic como runtime de agente para workflows do Ralph Engine.
    Detecta o binário CLI do Claude no seu PATH, valida disponibilidade e fornece
    uma contribuição de servidor MCP para gerenciamento de sessão. Use
    `ralph-engine agents launch official.claude.session` para iniciar uma sessão de
    código com Claude com os plugins, checks e fragmentos de prompt do seu projeto
    pré-carregados.
publisher: official
trust_level: official
plugin_version: 0.2.0-alpha.1
plugin_api_version: 1.0.0
runtime: true
lifecycle:
  - discover
  - load
runtime_hooks:
  - agent_bootstrap
  - mcp_registration
  - agent_launch
engine_version: ">=0.2.0-alpha.1"
capabilities:
  - agent_runtime
  - mcp_contribution
agents:
  - id: official.claude.session
    display_name: Claude session
    display_name_locales:
      pt-br: Sessão Claude
    summary: Claude runtime session for Ralph Engine.
    summary_locales:
      pt-br: Sessão de runtime do Claude para o Ralph Engine.
