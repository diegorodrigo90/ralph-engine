# ralph-engine project configuration (BMAD starter template)
# Docs: https://ralph-engine.dev/guides/configuration

schema_version: 1
default_locale: en

plugins:
  - id: official.basic
    activation: enabled
  - id: official.bmad
    activation: enabled
  - id: official.claude
    activation: enabled

# Agent execution settings.
# Core reads workflow_plugin + agent_plugin. Agent plugin reads the rest.
run:
  workflow_plugin: official.bmad
  agent_plugin: official.claude
  agent_id: official.claude.session
  # Additional tools beyond the base set (Bash,Read,Edit,Write,Glob,Grep).
  # Add MCP tools, Skill, Agent, WebSearch, etc. Comma-separated.
  # Base tools are always included — this list adds project-specific extras.
  allowed_tools: "Agent,Skill"
  max_turns: 200

# Plugin-owned sections (read by BMAD, not by core)
tracker:
  status_file: sprint-status.yaml

paths:
  stories: stories/

workflow:
  instructions: |
    Follow the BMAD workflow conventions configured for this project.
    Use the available commands, prompt fragments, and required checks
    supplied by the BMAD plugin.
