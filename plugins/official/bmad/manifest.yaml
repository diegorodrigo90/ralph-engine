id: official.bmad
kind: template
display_name: BMAD
display_name_locales:
  pt-br: BMAD
summary: Workflow plugin for BMAD scaffolding and prompts.
summary_locales:
  pt-br: Plugin de workflow para scaffolding e prompts do BMAD.
publisher: official
trust_level: official
plugin_version: 0.2.0-alpha.1
plugin_api_version: 1.0.0
engine_version: ">=0.2.0-alpha.1"
runtime: true
capabilities:
  - template
  - prompt_fragments
  - prepare_checks
  - doctor_checks
templates:
  - id: official.bmad.starter
    display_name: BMAD starter
    display_name_locales:
      pt-br: Starter BMAD
    summary: Starter template for BMAD-guided Ralph Engine projects.
    summary_locales:
      pt-br: Template inicial para projetos Ralph Engine guiados por BMAD.
prompts:
  - id: official.bmad.workflow
    display_name: BMAD workflow prompt
    display_name_locales:
      pt-br: Prompt de workflow BMAD
    summary: Prompt bundle for BMAD workflow assembly.
    summary_locales:
      pt-br: Pacote de prompts para montar workflows BMAD.
checks:
  - id: official.bmad.prepare
    kind: prepare
    display_name: BMAD prepare check
    display_name_locales:
      pt-br: Verificação de preparo BMAD
    summary: Runs typed prepare-time validation for BMAD workflows.
    summary_locales:
      pt-br: Executa validação tipada de preparo para workflows BMAD.
  - id: official.bmad.doctor
    kind: doctor
    display_name: BMAD doctor check
    display_name_locales:
      pt-br: Verificação de diagnóstico BMAD
    summary: Runs typed doctor-time validation for BMAD workflows.
    summary_locales:
      pt-br: Executa validação tipada de diagnóstico para workflows BMAD.
project:
  required_files:
    - .ralph-engine/config.yaml
    - .ralph-engine/prompt.md
