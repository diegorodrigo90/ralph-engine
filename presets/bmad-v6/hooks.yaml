# ralph-engine hooks — BMAD v6 preset
# Customize every step. ralph-engine never overwrites this file after init.
#
# Options per step:
#   name:     Display name
#   run:      Shell command to execute
#   required: true = block on failure, false = warn and continue
#   paths:    Only run when git diff shows changes in these globs (empty = always run)
#             Useful for projects with different toolchains per directory.
#
# Available variables in commands:
#   {{.StoryID}}    — Current story ID (e.g., "65.3")
#   {{.StoryTitle}} — Current story title
#   {{.EpicID}}     — Current epic ID
#   {{.ProjectDir}} — Project root directory

# ── PREFLIGHT — runs once before the loop starts ──
preflight:
  steps:
    - name: "SSH connectivity"
      run: "./scripts/dev-exec.sh echo ok"
      required: false

    - name: "Dev server running"
      run: "./scripts/dev-exec.sh curl -sf http://localhost:3000/health || true"
      required: false

# ── PRE-STORY — runs before each story ──
pre_story:
  steps: []

# ── POST-STORY — runs after each story completes ──
post_story:
  steps: []

# ── QUALITY GATES — path-filtered (only run when relevant files changed) ──
quality_gates:
  steps:
    - name: "Tests"
      run: "./scripts/dev-exec.sh NODE_ENV=development pnpm test"
      required: true
      # paths: ["apps/**", "packages/**"]  # Uncomment for path filtering

    - name: "Type check"
      run: "./scripts/dev-exec.sh pnpm type-check"
      required: true

    - name: "Build"
      run: "./scripts/dev-exec.sh pnpm build"
      required: true

    - name: "Storybook tests"
      run: "./scripts/dev-exec.sh 'cd apps/storybook && npx test-storybook --url http://127.0.0.1:6006'"
      required: false
      paths: ["packages/ui/**", "apps/storybook/**"]

    - name: "E2E tests"
      run: "./scripts/dev-exec.sh pnpm test:e2e"
      required: false
      paths: ["apps/web/**", "apps/api/**"]

    - name: "Dev logs clean"
      run: "test ! -f .logs/dev.log || ! grep -q 'ERROR' .logs/dev.log"
      required: false

    # Example: Python service with different toolchain
    # - name: "Python lint"
    #   run: "ruff check workers/my-service/"
    #   required: true
    #   paths: ["workers/my-service/**"]
    #
    # - name: "Python tests"
    #   run: "pytest workers/my-service/"
    #   required: true
    #   paths: ["workers/my-service/**"]

# ── POST-SESSION — runs when engine stops ──
post_session:
  steps: []
