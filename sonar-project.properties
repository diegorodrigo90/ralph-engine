sonar.projectKey=ralph-engine_ralph-engine
sonar.organization=ralph-engine
sonar.projectName=Ralph Engine
sonar.sources=core,plugins
sonar.exclusions=docs/**,site/**,packaging/**,tools/**,**/target/**
sonar.sourceEncoding=UTF-8

# Coverage from cargo-llvm-cov (lcov format)
sonar.rust.lcov.reportPaths=coverage/lcov.info

# Exclude generated/boilerplate files from duplication analysis.
# build.rs files are generated by the scaffolder and share identical
# locale-loading boilerplate across all plugins — this is by design.
# i18n fn_*.rs files are generated by re-build-utils at compile time.
# cli_smoke.rs has intentionally repetitive test patterns.
sonar.cpd.exclusions=**/build.rs,**/i18n/fn_*.rs,**/tests/cli_smoke.rs

# Exclude interactive/TUI code from coverage analysis.
# These files require a running terminal and cannot be covered by
# unit tests. They are tested via render-to-buffer tests in tests.rs
# (which cargo-llvm-cov measures), but the CLI entry points (tui.rs,
# run.rs, init.rs) spawn processes and terminals that can't run in CI.
sonar.coverage.exclusions=\
  core/crates/re-cli/src/commands/tui.rs,\
  core/crates/re-cli/src/commands/run.rs,\
  core/crates/re-cli/src/commands/init.rs,\
  core/crates/re-tui/src/terminal/render_input.rs,\
  core/crates/re-tui/src/terminal/style.rs,\
  core/crates/re-tui/src/logging.rs
