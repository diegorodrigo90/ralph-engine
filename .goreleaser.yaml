# GoReleaser configuration for ralph-engine
# Builds cross-platform binaries, publishes to GitHub Releases + Homebrew.
# Run: goreleaser release --clean
# Docs: https://goreleaser.com

version: 2

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - id: ralph-engine
    main: ./cmd/ralph-engine/
    binary: ralph-engine
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/diegorodrigo90/ralph-engine/internal/cli.Version={{.Version}}
      - -X github.com/diegorodrigo90/ralph-engine/internal/cli.BuildCommit={{.ShortCommit}}
      - -X github.com/diegorodrigo90/ralph-engine/internal/cli.BuildDate={{.Date}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: diegorodrigo90
    name: ralph-engine
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  extra_files:
    - glob: CHANGELOG.md
  header: |
    ## Ralph Engine v{{ .Version }}

    See [CHANGELOG.md](CHANGELOG.md) for full details.
  footer: |
    **Installation:**
    ```bash
    # npm
    npm install -g ralph-engine
    # Homebrew
    brew install diegorodrigo90/tap/ralph-engine
    # curl
    curl -fsSL https://raw.githubusercontent.com/diegorodrigo90/ralph-engine/main/scripts/install.sh | bash
    # Go
    go install github.com/diegorodrigo90/ralph-engine/cmd/ralph-engine@latest
    ```

# Homebrew tap — auto-updates on every release.
# Creates formula at diegorodrigo90/homebrew-tap/ralph-engine.rb
brews:
  - name: ralph-engine
    repository:
      owner: diegorodrigo90
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/diegorodrigo90/ralph-engine"
    description: "Autonomous AI development loop engine"
    license: "MIT"
    install: |
      bin.install "ralph-engine"
    test: |
      system "#{bin}/ralph-engine", "version"
    # Skip if token not set (e.g., local builds).
    skip_upload: auto
